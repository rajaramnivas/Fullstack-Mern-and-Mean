<!DOCTYPE html>
<html>
<head>
  <title>Register - Simple Node Server</title>
  <link rel="stylesheet" href="style.css">
  <script>
    function validateRegister(event) {
      event.preventDefault();
      const username = document.getElementById('reg-username').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value.trim();
      const confirm = document.getElementById('reg-confirm').value.trim();
      let error = '';
      if (!username) {
        error += 'Username is required. ';
      }
      if (!email) {
        error += 'Email is required. ';
      } else if (!/^\S+@\S+\.\S+$/.test(email)) {
        error += 'Please enter a valid email address. ';
      }
      if (!password) {
        error += 'Password is required. ';
      }
      if (password.length > 0 && password.length < 6) {
        error += 'Password must be at least 6 characters. ';
      }
      if (password !== confirm) {
        error += 'Passwords do not match.';
      }
      const errorDiv = document.getElementById('reg-error');
      if (error) {
        errorDiv.textContent = error;
        errorDiv.style.display = 'block';
      } else {
        errorDiv.style.display = 'none';
        alert('Registration successful (client-side only)!');
      }
    }
  </script>
</head>
<body>
  <nav>
    <ul>
      <li><a href="index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="register.html">Register</a></li>
    </ul>
  </nav>
  <main>
    <h1>Register</h1>
    <form onsubmit="validateRegister(event)">
      <div id="reg-error" style="color: #d72660; display: none; margin-bottom: 1rem;"></div>
      <label for="reg-username">Username:</label><br>
      <input type="text" id="reg-username" name="username" required><br><br>
      <label for="reg-email">Email:</label><br>
      <input type="email" id="reg-email" name="email" required><br><br>
      <label for="reg-password">Password:</label><br>
      <input type="password" id="reg-password" name="password" required><br><br>
      <label for="reg-confirm">Confirm Password:</label><br>
      <input type="password" id="reg-confirm" name="confirm" required><br><br>
      <button type="submit">Register</button>
    </form>
  </main>
  <footer>
    <p>&copy; 2025 Simple Node Server. All rights reserved.</p>
  </footer>
</body>
</html>
